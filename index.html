<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Digital - Auto Order</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal { display: none; position: fixed; z-index: 50; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .loading { display: none; }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans">

    <div class="max-w-md mx-auto p-4">
        <!-- Header -->
        <div class="text-center py-6">
            <h1 class="text-3xl font-extrabold text-blue-500">DIGITAL STORE</h1>
            <p class="text-gray-400 text-sm">Pilih produk dan selesaikan pembayaran</p>
        </div>

        <!-- Form Order -->
        <div class="bg-slate-800 rounded-2xl p-6 shadow-xl border border-slate-700">
            <div class="mb-5">
                <label class="block text-sm font-semibold mb-2">Pilih Kategori Produk</label>
                <select id="kategori" onchange="updateProduk()" class="w-full bg-slate-700 border border-slate-600 rounded-lg p-3 outline-none focus:border-blue-500">
                    <option value="">-- Pilih Kategori --</option>
                    <option value="NO DRAG HEAD Ⅰ">NO DRAG HEAD Ⅰ</option>
                    <option value="HEADLOCK Ⅱ">HEADLOCK Ⅱ</option>
                    <option value="DRAG HEAD Ⅲ">DRAG HEAD Ⅲ</option>
                    <option value="AIMBOT Ⅳ">AIMBOT Ⅳ</option>
                    <option value="HOLOGRAM Ⅴ">HOLOGRAM Ⅴ</option>
                    <option value="SET UP + TOOLS MOUSE">SET UP + TOOLS MOUSE</option>
                    <option value="AIMLOCK Ⅳ">AIMLOCK Ⅳ</option>
                </select>
            </div>

            <div class="mb-5">
                <label class="block text-sm font-semibold mb-2">Pilih Varian & Harga</label>
                <select id="produk" class="w-full bg-slate-700 border border-slate-600 rounded-lg p-3 outline-none focus:border-blue-500">
                    <option value="">-- Pilih Varian --</option>
                </select>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-semibold mb-2">Nama / Username</label>
                <input type="text" id="username" placeholder="Masukkan ID/Nama" class="w-full bg-slate-700 border border-slate-600 rounded-lg p-3 outline-none focus:border-blue-500">
            </div>

            <button onclick="showQRIS()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition duration-300">
                BELI SEKARANG
            </button>
        </div>
    </div>

    <!-- Modal QRIS & Upload -->
    <div id="modalQRIS" class="modal flex items-center justify-center p-4">
        <div class="bg-white text-black rounded-2xl p-6 max-w-sm w-full text-center overflow-y-auto max-h-screen">
            <h3 class="font-bold text-xl mb-2 text-blue-600">PEMBAYARAN</h3>
            <img src="https://i.ibb.co.com/nNq3Gs0F/IMG-20260511-154358-835.jpg" alt="QRIS" class="mx-auto border-2 border-gray-200 rounded-lg mb-4 w-48">
            
            <hr class="mb-4">
            
            <div class="text-left mb-4">
                <label class="block text-xs font-bold text-gray-700 mb-1">UPLOAD BUKTI TRANSFER:</label>
                <input type="file" id="buktiFile" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>

            <button id="btnWA" onclick="prosesUpload()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-lg mb-2 flex items-center justify-center">
                <span id="textBtn">KONFIRMASI VIA WHATSAPP</span>
                <span id="loader" class="loading ml-2">⌛ Memproses...</span>
            </button>
            <button onclick="closeModal()" class="text-gray-500 text-sm">Batal</button>
        </div>
    </div>

    <script>
        const dataProduk = {
            "NO DRAG HEAD Ⅰ": ["100% — 70K", "90% — 35K", "80% — 25K", "70% — 15K", "60% — 10K"],
            "HEADLOCK Ⅱ": ["90% — 55K", "80% — 45K", "70% — 35K", "60% — 25K"],
            "DRAG HEAD Ⅲ": ["80% — 15K", "70% — 10K", "60% — 5K"],
            "AIMBOT Ⅳ": ["90% — 30K", "70% — 25K", "60% — 15K"],
            "HOLOGRAM Ⅴ": ["BLUE — 10K", "RED — 15K", "3D — 25K"],
            "SET UP + TOOLS MOUSE": ["V1% — 35K", "V2% — 20K", "V3% — 15K"],
            "AIMLOCK Ⅳ": ["80% — 20K", "70% — 15K", "60% — 5K"]
        };

        function updateProduk() {
            const kategori = document.getElementById('kategori').value;
            const produkSelect = document.getElementById('produk');
            produkSelect.innerHTML = '<option value="">-- Pilih Varian --</option>';
            if(kategori && dataProduk[kategori]) {
                dataProduk[kategori].forEach(item => {
                    let opt = document.createElement('option');
                    opt.value = item; opt.innerHTML = item;
                    produkSelect.appendChild(opt);
                });
            }
        }

        function showQRIS() {
            if(!document.getElementById('username').value || !document.getElementById('produk').value) return alert("Isi data dulu!");
            document.getElementById('modalQRIS').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modalQRIS').style.display = 'none'; }

        async function prosesUpload() {
            const fileInput = document.getElementById('buktiFile');
            const btnWA = document.getElementById('btnWA');
            const loader = document.getElementById('loader');
            const textBtn = document.getElementById('textBtn');

            if (fileInput.files.length === 0) {
                alert("Silakan pilih foto bukti transfer dulu, Bos!");
                return;
            }

            // Ganti ini dengan API Key ImgBB kamu jika mau permanen (ini contoh pakai public)
            const apiKey = "655010c212dd65f776c059fdee02da9f"; 
            const formData = new FormData();
            formData.append("image", fileInput.files[0]);

            // Munculkan loading
            btnWA.disabled = true;
            loader.style.display = "inline";
            textBtn.innerText = "SEDANG UPLOAD...";

            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
                    method: "POST",
                    body: formData
                });
                const result = await response.json();
                
                if (result.success) {
                    kirimWA(result.data.url);
                } else {
                    alert("Gagal upload gambar, coba lagi.");
                }
            } catch (error) {
                alert("Terjadi kesalahan koneksi.");
            } finally {
                btnWA.disabled = false;
                loader.style.display = "none";
                textBtn.innerText = "KONFIRMASI VIA WHATSAPP";
            }
        }

        function kirimWA(urlGambar) {
            const noWa = "6285764410376"; 
            const kategori = document.getElementById('kategori').value;
            const produk = document.getElementById('produk').value;
            const user = document.getElementById('username').value;

            const text = `Halo Bos, Saya mau konfirmasi pembayaran:%0A%0A` +
                         `*Username:* ${user}%0A` +
                         `*Kategori:* ${kategori}%0A` +
                         `*Varian:* ${produk}%0A%0A` +
                         `*BUKTI TRANSFER:* ${urlGambar}%0A%0A` +
                         `_Mohon segera diproses ya!_`;
            
            window.open(`https://api.whatsapp.com/send?phone=${noWa}&text=${text}`, '_blank');
        }
    </script>
</body>
</html>
